name: Build and Push Docker Image

on:
  push:
    branches: [main,feat/txlist-execution-witness]
  release:
    types: [published]

env:
  REGISTRY_IMAGE_ALETHIA: us-docker.pkg.dev/evmchain/images/alethia-reth
  REGISTRY_IMAGE_TAIKO: us-docker.pkg.dev/evmchain/images/taiko-reth

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: arc-runner-set
          - platform: linux/arm64
            runner: arc-runner-set-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GAR_JSON_KEY }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_IMAGE_ALETHIA }}
            ${{ env.REGISTRY_IMAGE_TAIKO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=nightly,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Build and push by digest
        id: build
        timeout-minutes: 30
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: |
            type=image,"name=${{ env.REGISTRY_IMAGE_ALETHIA }},${{ env.REGISTRY_IMAGE_TAIKO }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Prepare platform pair
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: arc-runner-set
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GAR_JSON_KEY }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_IMAGE_ALETHIA }}
            ${{ env.REGISTRY_IMAGE_TAIKO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=nightly,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Create manifest lists and push
        working-directory: /tmp/digests
        env:
          IMAGES: |-
            ${{ env.REGISTRY_IMAGE_ALETHIA }}
            ${{ env.REGISTRY_IMAGE_TAIKO }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          digests=( * )
          shopt -u nullglob
          if [ ${#digests[@]} -eq 0 ]; then
            echo "No digest files found in /tmp/digests; cannot compose manifest lists." >&2
            exit 1
          fi
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            tags=$(jq -cr --arg img "$image" \
              '.tags | map(select(startswith($img + ":"))) | map("-t " + .) | join(" ")' \
              <<< "$DOCKER_METADATA_OUTPUT_JSON")
            if [ -z "$tags" ]; then
              echo "No tags resolved for $image; skipping." >&2
              continue
            fi
            sources=""
            for d in "${digests[@]}"; do
              sources+="${image}@sha256:${d} "
            done
            echo "Composing manifest list for ${image}:"
            echo "  tags:    $tags"
            echo "  sources: $sources"
            # shellcheck disable=SC2086
            docker buildx imagetools create $tags $sources
          done <<< "$IMAGES"
