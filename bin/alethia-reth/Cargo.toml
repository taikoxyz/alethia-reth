[package]
name = "alethia-reth-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "alethia-reth"
path = "src/main.rs"

[dependencies]
alethia-reth-cli = { path = "../../crates/cli" }
alethia-reth-node = { path = "../../crates/node" }
alethia-reth-rpc = { path = "../../crates/rpc" }
alloy-consensus = { workspace = true }
alloy-rlp = { workspace = true }
eyre = { workspace = true }
futures-util = { workspace = true }
jsonrpsee-types = { workspace = true }
reth = { workspace = true }
reth-cli-util = { workspace = true }
reth-evm = { workspace = true }
reth-node-api = { workspace = true }
reth-node-builder = { workspace = true }
reth-optimism-exex = { workspace = true }
reth-optimism-trie = { workspace = true }
reth-provider = { workspace = true }
reth-rpc = { workspace = true }
reth-rpc-eth-api = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
alloy-eips = { workspace = true }
alloy-primitives = { workspace = true }
reth-ethereum-primitives = { workspace = true, features = ["test-utils"] }
reth-execution-types = { workspace = true }
reth-exex = { workspace = true }
reth-exex-test-utils = { workspace = true }
reth-primitives-traits = { workspace = true, features = ["test-utils"] }
reth-storage-api = { workspace = true }
reth-trie = { workspace = true }
reth-trie-common = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "test-util"] }
